# Render Blueprint (optional). See https://render.com/docs/blueprint-spec
#
# If you already have a Web Service (e.g. cook-as-u-go.onrender.com), you do not need to
# apply this whole file as a new Blueprint. Instead: link this GitHub repo, set
# Root Directory = Backend, Build = npm ci, Start = npm start, Health Check Path = /api/health,
# and turn on Auto-Deploy for branch main.
#
# Receipt scan: set SCAN_API_URL on the kitchen service to your ScanAndSave origin, e.g.
# https://cook-as-u-go-scan.onrender.com (Kitchen app calls https://cook-as-u-go.onrender.com only).

services:
  - type: web
    name: cook-as-u-go-kitchen
    runtime: node
    plan: starter
    region: oregon
    rootDir: Backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SALT_PEPPER
        sync: false
      - key: SALT_PEPPER_API_KEY_SALT
        sync: false
      - key: SCAN_API_URL
        sync: false
